# grove — release tag materializer (adr-0028).
#
# Cuts the git tag `grove-v<version>` that mirrors the package's host-neutral
# VERSION. It does NOT decide the version: the judgment
# (the semver level) and the human act both happen UPSTREAM, when the
# maintainer approves and merges the PR that bumps
# `plugins/grove/VERSION` (adr-0031, preserving adr-0028 D2/D3). This job only
# materializes the tag that release already implies.
#
# Deterministic + idempotent: it creates `grove-v<version>` only if that tag
# is absent. A rerun no-ops only after peeling an existing tag and proving it
# identifies the same workflow-event commit. It is NOT self-healing across
# a skipped version — a version whose tag failed during an outage needs a
# hand-cut, like the one-time `grove-v0.1.0` seed (adr-0028 Consequences 2).
#
# NO RECURSION: the tag push targets `refs/tags/*`, which matches no workflow's
# `push: branches: [main]` trigger, and pushes made with the default
# GITHUB_TOKEN do not spawn new workflow runs — so neither this job nor
# `grove-tests.yml` retriggers.

name: release-tag

on:
  push:
    branches: [main]
    # VERSION is the sole release authority (adr-0031/spec-0004).
    paths:
      - "plugins/grove/VERSION"

# WRITE — unlike grove-tests.yml (read-only), this pushes a tag. The default
# GITHUB_TOKEN with contents:write suffices; no PAT. This is grove CI's only
# write-capable surface, isolated here on purpose (adr-0028 D4, Honest Cost 1).
permissions:
  contents: write

jobs:
  tag:
    name: validate and tag the release authority
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Check generated adapters
        run: npm run check --prefix plugins/grove/build

      - name: Test every release-coupled package
        run: |
          npm test --prefix plugins/grove/build
          npm test --prefix plugins/grove/operations
          npm test --prefix plugins/grove/release
          npm test --prefix plugins/grove/gates
          npm test --prefix plugins/grove/check

      - name: Typecheck every release-coupled package
        run: |
          npm run typecheck --prefix plugins/grove/build
          npm run typecheck --prefix plugins/grove/operations
          npm run typecheck --prefix plugins/grove/release
          npm run typecheck --prefix plugins/grove/gates
          npm run typecheck --prefix plugins/grove/check

      - name: Smoke the package-level Codex projection
        run: npm run smoke:codex --prefix plugins/grove/release

      - name: Validate release candidate
        run: npm run check:release --prefix plugins/grove/release

      - name: Materialize grove-v<version>
        run: |
          set -euo pipefail
          v=$(tr -d '\n' < plugins/grove/VERSION)
          tag="grove-v$v"
          tag_ref="refs/tags/$tag"
          git fetch --force --tags origin
          if git show-ref --verify --quiet "$tag_ref"; then
            tag_commit=$(git rev-parse "$tag_ref^{commit}")
            node plugins/grove/release/bin/check-tag.mjs "$GITHUB_SHA" "$tag_commit"
            echo "$tag already identifies $GITHUB_SHA — no-op"
            exit 0
          fi
          node plugins/grove/release/bin/check-tag.mjs "$GITHUB_SHA"
          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag_ref"
          echo "created and pushed $tag at $GITHUB_SHA"
