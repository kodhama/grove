# grove — review-bookkeeping check (spec-0002, Layer A).
#
# Renders a read-only status view of a PR's verdict-record comments and gates
# the merge on completeness / freshness / coverage / separation /
# approved-upstream / graph-resolution / record-integrity gaps.
#
# GREEN IS NOT APPROVAL — a human still judges genuineness and merges.
#
# This file is a TEMPLATE installed into a consumer repo by `/grove:setup`
# (removed by `/grove:remove`). The setup skill resolves the two placeholders:
#   <INSTALL_PATH>   — where the check runtime was copied (default `.grove/check`)
#   <NODE_VERSION>   — this project's Node version (e.g. `20`)
# Do NOT copy this template verbatim into grove's OWN `.github/workflows/` —
# grove-self runs its own adapted copy (preserved `retired/review-bookkeeping/check` runtime
# path, pinned Node), adopted per adr-0017 and landed by direct commit to the
# default branch; see decisions/adr-0017-dispatcher-posts-records-self-adoption.md.
#
# grove does not gate its own arrival (adr-0014 move 1b). No red on the install
# PR — and this needs NO extra workflow STEP: the check itself self-detects a
# fresh install. Its first act (bin/check.mjs) asks whether grove is installed
# on the protected default branch at all yet — i.e. whether a grove-review-policy
# block exists on origin/<default>. If ABSENT (this PR is introducing grove), the
# check exits GREEN (non-gating) with "grove install detected — the check
# activates on your next PR" and never runs the gating logic; once merged, every
# subsequent PR runs it for real. The discriminator is read from origin/<default>
# ONLY (HEAD-independent), and keys on POLICY-presence, not workflow-file
# presence, so it never overrides adr-0013's carrier fail-close. And because this
# workflow triggers on pull_request / issue_comment (never push), an install
# landed as a direct commit fires no run at all.

name: grove review-bookkeeping

on:
  # The check's two inputs are the PR's base...head diff AND its verdict-record
  # comment stream, so it must re-run on both axes:
  pull_request:
    types: [opened, synchronize, reopened]
  # A verdict record IS a PR comment — so a reviewer posting (or editing, or
  # deleting) a record must re-evaluate the PR without a new push. `edited`
  # matters because an edited record is rejected (§A.4); `deleted` because a
  # record removed changes the owed-map's satisfaction. Gated to PR comments in
  # the job `if:` below (issue_comment also fires on plain issues). The check
  # only READS comments and writes its verdict to the job summary + exit code —
  # it posts nothing, so there is no comment→re-run loop.
  issue_comment:
    types: [created, edited, deleted]

# Minimal permissions — the check only reads:
#   contents: read       — git content: the base...head diff and the policy read
#                          from origin/<default> (the protected branch).
#   pull-requests: read  — the PR's issue-comment stream (the verdict records)
#                          and the PR's head/base SHAs via the REST API.
# It needs no write scope: it never posts a comment, label, status, or commit.
permissions:
  contents: read
  pull-requests: read

jobs:
  review-bookkeeping:
    # issue_comment fires on plain (non-PR) issues too; run only for PR comments.
    if: ${{ github.event_name == 'pull_request' || github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      # Resolve the PR number uniformly across both triggers (the two event
      # payloads name it differently).
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      # Resolve the head/base SHAs, the base ref, and the default branch from the
      # REST API — the issue_comment payload carries none of these, so we fetch
      # them the same way for both triggers and hand them to the check as
      # GROVE_* overrides (the context resolver's documented off-pull_request
      # path, shell/context.mjs).
      - name: Resolve PR context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}" \
            --jq '"head=" + .head.sha, "base=" + .base.sha, "base_ref=" + .base.ref, "default=" + .base.repo.default_branch' \
            >> "$GITHUB_OUTPUT"

      # Full history: the check computes a base...head MERGE-BASE diff AND reads
      # policy from origin/<default>. A shallow clone lacks the merge-base and
      # the protected-branch commit, so fetch-depth: 0. (A documented shallower
      # fetch of just the base + default branch is possible but fiddlier; depth 0
      # is the robust default — trim it later if clone time becomes a concern.)
      - name: Check out the PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ctx.outputs.head }}
          fetch-depth: 0

      # Make the diff base and the protected default branch resolvable as remote
      # refs (checkout only fetched the head ref's history). origin/<default> is
      # exactly what the check reads policy from (§C.0 / INV1).
      - name: Fetch base + protected default branch
        run: |
          git fetch --no-tags origin \
            "+refs/heads/${{ steps.ctx.outputs.base_ref }}:refs/remotes/origin/${{ steps.ctx.outputs.base_ref }}" \
            "+refs/heads/${{ steps.ctx.outputs.default }}:refs/remotes/origin/${{ steps.ctx.outputs.default }}"

      # The check is zero-dependency (type: module, no npm install) — only a
      # modern Node runtime is needed.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "<NODE_VERSION>"

      - name: Run the grove review-bookkeeping check
        env:
          # Provided automatically by Actions; the check reads these from the
          # environment: GITHUB_TOKEN (the record-stream API + PR reads),
          # GITHUB_EVENT_PATH (the event payload), GITHUB_STEP_SUMMARY (the
          # rendered status view).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uniform context — required for issue_comment (whose payload lacks
          # SHAs), harmless overrides for pull_request.
          GROVE_PR_NUMBER: ${{ steps.pr.outputs.number }}
          GROVE_HEAD_SHA: ${{ steps.ctx.outputs.head }}
          GROVE_BASE_SHA: ${{ steps.ctx.outputs.base }}
          GROVE_DEFAULT_BRANCH: ${{ steps.ctx.outputs.default }}
        # Exit code gates the merge: 0 = green (bookkeeping complete, NOT
        # approval), 1 = red (a gap — see the job summary), 2 = hard error.
        run: node <INSTALL_PATH>/bin/check.mjs
